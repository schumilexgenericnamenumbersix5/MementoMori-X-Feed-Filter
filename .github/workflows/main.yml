name: run-filter

on:
  schedule:
    # Adjust this cron schedule to match how often you want the filter to run
    - cron: '0 * * * *' 
  workflow_dispatch:

env:
  # This environment variable forces all Node 20 actions to run on Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Adjust if your script requires a different version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Feed Filter
        env:
          # Ensure your secrets match the variables your Python script expects
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }} 
        run: |
          # Replace 'main.py' if your specific entry script has a different name
          python main.py
