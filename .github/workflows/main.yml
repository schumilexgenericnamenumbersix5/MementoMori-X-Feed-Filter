name: Twice Daily Filter
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  run-filter:
    runs-on: ubuntu-latest
    steps:
      # Upgrading to v6 is the correct fix for Node 24 compatibility
      - uses: actions/checkout@v6
      
      # Upgrading to v6 removes the setup-python deprecation warning
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: pip install requests feedparser
        
      - name: Run Filter
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python filter.py
